<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BibleBeam Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      color: #fff;
      font-family: Georgia, 'Times New Roman', serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4vw;
      text-align: center;
    }

    #reference {
      font-family: -apple-system, Arial, sans-serif;
      font-size: clamp(14px, 2vw, 24px);
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      transition: opacity 0.3s;
    }

    #verse-text {
      font-size: clamp(20px, 4vw, 56px);
      line-height: 1.55;
      max-width: 900px;
      transition: opacity 0.3s;
    }

    #status {
      position: absolute;
      bottom: 24px;
      right: 28px;
      font-family: -apple-system, Arial, sans-serif;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
    }

    .fade-out { opacity: 0; }
    .fade-in  { opacity: 1; }
  </style>
</head>
<body>
  <div id="reference"></div>
  <div id="verse-text">Waiting...</div>
  <div id="status">Connecting...</div>

  <script>
    const referenceEl = document.getElementById('reference');
    const verseEl     = document.getElementById('verse-text');
    const statusEl    = document.getElementById('status');

    function fade(fn) {
      referenceEl.classList.add('fade-out');
      verseEl.classList.add('fade-out');
      setTimeout(() => {
        fn();
        referenceEl.classList.remove('fade-out');
        verseEl.classList.remove('fade-out');
      }, 200);
    }

    function showVerse(payload) {
      fade(() => {
        referenceEl.textContent = `${payload.reference} · ${payload.translation}`;
        verseEl.textContent     = payload.verseText;
      });
    }

    function showWaiting() {
      fade(() => {
        referenceEl.textContent = '';
        verseEl.textContent     = '';
      });
    }

    // ── WebSocket connection ──────────────────────────────────────────────────
    // Auto-detect host — works whether opened via LAN IP or localhost
    const host = window.location.hostname || 'localhost';
    let ws;
    let reconnectTimer;

    function connect() {
      ws = new WebSocket(`ws://${host}:7700`);

      ws.onopen = () => {
        statusEl.textContent = 'Connected';
        clearTimeout(reconnectTimer);
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'verse') {
          showVerse(msg.payload);
        } else if (msg.type === 'clear') {
          showWaiting();
        }
      };

      ws.onclose = () => {
        statusEl.textContent = 'Reconnecting...';
        reconnectTimer = setTimeout(connect, 3000);
      };

      ws.onerror = () => {
        statusEl.textContent = 'Connection error';
      };
    }

    connect();
  </script>
</body>
</html>
